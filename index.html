<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>إمداد ستيل | الدقة والابتكار</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
    <style>body { font-family: 'IBM Plex Sans', sans-serif; }</style>
</head>
<body class="bg-gray-50">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <img src="logo.png" class="h-12 w-auto" alt="Logo">
            <nav class="hidden md:flex gap-8 font-bold text-gray-700">
                <a href="#services" class="hover:text-red-600">خدماتنا</a>
            </nav>
        </div>
    </header>

    <section class="py-16" id="services">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-3xl font-bold text-center mb-12">إمكانياتنا</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6">
                
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <img src="laser.jpg" class="w-full h-40 object-cover rounded-xl mb-4" alt="القطع بالليزر">
                    <h3 class="font-bold text-lg">القطع بالليزر</h3>
                </div>

                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <img src="bending.jpg" class="w-full h-40 object-cover rounded-xl mb-4" alt="الثني">
                    <h3 class="font-bold text-lg">الثني</h3>
                </div>

                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <img src="rolling.jpg" class="w-full h-40 object-cover rounded-xl mb-4" alt="الدرفلة">
                    <h3 class="font-bold text-lg">الدرفلة والتشكيل</h3>
                </div>

                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <img src="welding.jpg" class="w-full h-40 object-cover rounded-xl mb-4" alt="اللحام">
                    <h3 class="font-bold text-lg">اللحام والأرجون</h3>
                </div>

                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <img src="design.jpg" class="w-full h-40 object-cover rounded-xl mb-4" alt="التصميم">
                    <h3 class="font-bold text-lg">تصميم مخصص</h3>
                </div>

            </div>
        </div>
    </section>

</body>
</html>
