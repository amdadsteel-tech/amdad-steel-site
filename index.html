<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>إمداد ستيل | الدقة والابتكار في تشكيل المعادن</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <style>body { font-family: 'IBM Plex Sans', sans-serif; scroll-behavior: smooth; }</style>
</head>
<body class="bg-[#F0F2F5] text-on-surface">

    <header class="fixed top-0 left-0 right-0 z-50 border-b border-gray-200 bg-white/95 backdrop-blur-md">
        <div class="flex flex-row-reverse justify-between items-center w-full px-6 md:px-16 py-4 max-w-7xl mx-auto">
            <img alt="إمداد ستيل" class="h-12 w-auto object-contain" src="logo.png">
        </div>
    </header>

    <main class="pt-24">
        <section class="py-16 bg-white" id="services">
            <div class="max-w-7xl mx-auto px-6">
                <h2 class="text-3xl font-bold text-center mb-12">إمكانياتنا وخدماتنا الصناعية</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    
                    <div class="bg-white p-4 border rounded-2xl shadow-sm">
                        <img src="laser.jpg" class="w-full h-48 object-cover rounded-xl mb-4" alt="القطع بالليزر">
                        <h3 class="font-bold text-lg text-center">القطع بالليزر</h3>
                    </div>

                    <div class="bg-white p-4 border rounded-2xl shadow-sm">
                        <img src="bending.jpg" class="w-full h-48 object-cover rounded-xl mb-4" alt="الثني">
                        <h3 class="font-bold text-lg text-center">الثني الهيدروليكي</h3>
                    </div>

                    <div class="bg-white p-4 border rounded-2xl shadow-sm">
                        <img src="rolling.jpg" class="w-full h-48 object-cover rounded-xl mb-4" alt="الدرفلة">
                        <h3 class="font-bold text-lg text-center">الدرفلة والتشكيل</h3>
                    </div>

                    <div class="bg-white p-4 border rounded-2xl shadow-sm">
                        <img src="welding.jpg" class="w-full h-48 object-cover rounded-xl mb-4" alt="اللحام">
                        <h3 class="font-bold text-lg text-center">اللحام والأرجون</h3>
                    </div>

                    <div class="bg-white p-4 border rounded-2xl shadow-sm">
                        <img src="design.jpg" class="w-full h-48 object-cover rounded-xl mb-4" alt="التصميم">
                        <h3 class="font-bold text-lg text-center">تصميم مخصص 3D</h3>
                    </div>

                </div>
            </div>
        </section>
    </main>
</body>
</html>
