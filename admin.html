<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة إمداد ستيل</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-center">رفع مشاريع إمداد ستيل</h1>
        <form id="projectForm" class="space-y-4">
            <input type="text" id="title" placeholder="عنوان المشروع" class="w-full p-2 border rounded" required>
            <textarea id="description" placeholder="وصف المشروع" class="w-full p-2 border rounded"></textarea>
            <input type="file" id="file" class="w-full p-2" required>
            <button type="submit" class="w-full bg-red-600 text-white p-3 rounded font-bold">رفع وحفظ المشروع</button>
        </form>
    </div>
    <script>
        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('file', document.getElementById('file').files[0]);
            
            // تأكد من رابط الـ Worker الخاص بك هنا
            const res = await fetch('https://amdad-admin.amdad-steel.workers.dev', { method: 'POST', body: formData });
            if(res.ok) alert('تم الحفظ بنجاح!');
            else alert('حدث خطأ');
        });
    </script>
</body>
</html>
