<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم إمداد ستيل</title>
    <style>body { font-family: sans-serif; padding: 20px; text-align: center; } input, button { display: block; margin: 10px auto; width: 80%; padding: 10px; }</style>
</head>
<body>
    <h2>رفع صور المشاريع</h2>
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="uploadImage()">رفع وحفظ</button>
    <script>
        async function uploadImage() {
            const file = document.getElementById('fileInput').files[0];
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();
            alert('تم الرفع بنجاح! الرابط: ' + data.url);
        }
    </script>
</body>
</html>
