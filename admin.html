<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة إدارة إمداد ستيل</title>
</head>
<body>
    <h1>إضافة مشروع جديد</h1>
    <form id="projectForm">
        <input type="text" id="title" placeholder="عنوان المشروع" required><br><br>
        <textarea id="description" placeholder="وصف المشروع"></textarea><br><br>
        <input type="file" id="file" required><br><br>
        <button type="submit">حفظ المشروع</button>
    </form>
    <script>
        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('file', document.getElementById('file').files[0]);
            
            // تأكد من وضع رابط الـ Worker الخاص بك هنا
            const res = await fetch('https://amdad-admin.amdad-steel.workers.dev', { method: 'POST', body: formData });
            if(res.ok) alert('تم الحفظ بنجاح!');
            else alert('حدث خطأ أثناء الحفظ');
        });
    </script>
</body>
</html>
