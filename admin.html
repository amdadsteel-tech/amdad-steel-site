<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم إمداد ستيل</title>
</head>
<body>
    <h2>رفع صور المشاريع</h2>
    <input type="file" id="fileInput" accept="image/*">
    <input type="text" id="descInput" placeholder="اكتب وصف الصورة هنا...">
    <button onclick="uploadImage()">رفع وحفظ</button>
    <p id="status"></p>
    <script>
        async function uploadImage() {
            const file = document.getElementById('fileInput').files[0];
            const desc = document.getElementById('descInput').value;
            const status = document.getElementById('status');
            if(!file) return alert("اختر صورة أولاً");
            status.innerText = "جاري الرفع...";
            const formData = new FormData();
            formData.append('file', file);
            formData.append('desc', desc);
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            if(res.ok) { status.innerText = "تم الرفع بنجاح!"; }
            else { status.innerText = "حدث خطأ."; }
        }
    </script>
</body>
</html>
